name: release-please

# Versioning automation (SemVer): reads Conventional Commits on main, maintains a
# running Release PR (version bump + CHANGELOG.md + VERSION + in-tool __version__);
# merging that PR creates the git tag + GitHub Release. Config:
# release-please-config.json + .release-please-manifest.json.
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # GitHub forces JS actions onto Node 24 from 2026-06-16; opt in early so the
    # switch is verified on our runs instead of surprising us at the deadline.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: googleapis/release-please-action@v4
