name: CI

# Runs on every push and pull request: lints, byte-compiles the tools, checks the
# installer's shell syntax, and runs the deletion-safety test suite on Linux + macOS.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dev tooling
        run: python -m pip install --upgrade pip pytest ruff

      - name: Lint (ruff)
        run: ruff check tools/ tests/

      - name: Byte-compile the tools
        run: python -m py_compile tools/fetch-attachments.py tools/ocr-folder.py tools/reminder-helper.py

      - name: Check installer shell syntax
        if: runner.os != 'Windows'
        run: bash -n install.sh

      - name: Run tests
        run: python -m pytest tests/ -q
